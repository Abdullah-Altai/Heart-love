<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Heart Words</title>

<style>
body{
    margin:0;
    height:100vh;
    background:#000;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
}

#ui{
    position:relative;
    width:90vw;
    height:90vw;
    max-width:600px;
    max-height:600px;
}

.Love_word{
    position:absolute;
    left:50%;
    top:50%;
    color:#ea80b0;
    font-size:1.2rem;
    letter-spacing:2px;
    white-space:nowrap;
    text-shadow:0 0 2px #fff, 0 0 8px #ff4fa3;
    opacity:0.8;
    transform:translate(-50%, -50%);
}

@media (max-width:600px){
    .Love_word{
        font-size:0.8rem;
        letter-spacing:1px;
    }
}
</style>
</head>

<body>

<div id="ui"></div>

<script>
const ui = document.getElementById("ui");
const words = [];
const count = 95;

function heart(t){
    return {
        x: 16 * Math.pow(Math.sin(t), 3),
        y: 13 * Math.cos(t)
           - 5 * Math.cos(2*t)
           - 2 * Math.cos(3*t)
           - Math.cos(4*t)
    };
}

for(let i=0;i<count;i++){
    let span = document.createElement("span");
    span.className = "Love_word";
    span.innerText = "I love You";

    ui.appendChild(span);

    words.push({
        el: span,
        t: (i/count)*Math.PI*2
    });
}

let move = 0;

function animate(){
    move += 0.005;

    const size = ui.clientWidth / 42;

    words.forEach(w=>{
        let t = w.t + move;
        let p = heart(t);

        let x = p.x * size;
        let y = -p.y * size;

        w.el.style.transform = `
            translate(-50%, -50%)
            translate(${x}px, ${y}px)
        `;
    });

    requestAnimationFrame(animate);
}

animate();
</script>

</body>
</html>
